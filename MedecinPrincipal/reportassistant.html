<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generate Report</title>
  <style>
    /* Style général pour la page */
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    /* Conteneur de génération de rapport */
    #reportInfo {
      background-color: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 500px;
      text-align: center;
    }

    /* Texte de détails du rapport */
    #assistantDetails {
      font-size: 18px;
      margin-bottom: 20px;
      color: #333;
    }

    /* Boutons */
    button {
      background-color: #4CAF50;
      color: white;
      padding: 12px 20px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
      width: 48%;
      margin-top: 10px;
    }

    button:hover {
      background-color: #45a049;
    }

    /* Bouton de cancel (annuler) */
    button[type="button"] {
      background-color: #f44336;
    }

    button[type="button"]:hover {
      background-color: #e53935;
    }

    /* Conteneur des boutons */
    .button-container {
      display: flex;
      justify-content: space-between;
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <h1>Generate Report for Assistant</h1>

  <div id="reportInfo">
    <p id="assistantDetails">Generating report...</p>
    <div class="button-container">
      <button onclick="generateReport()">Generate Report</button>
      <button type="button" onclick="window.location.href='ListofA.html'">Cancel</button>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const urlParams = new URLSearchParams(window.location.search);
      const id = parseInt(urlParams.get('id')); // Get the ID from the URL
      let assistants = JSON.parse(localStorage.getItem("assistants")) || [];
      const assistant = assistants.find(a => a.id === id);

      if (assistant) {
        document.getElementById("assistantDetails").innerHTML = `Generating report for ${assistant.name}.`;
      } else {
        document.getElementById("assistantDetails").innerHTML = "Assistant not found.";
      }

      window.generateReport = function() {
        if (assistant) {
          const reportData = {
            assistant: assistant.name,
            doctor: assistant.doctor,
            status: assistant.status,
            date: new Date().toLocaleDateString(),
            type: 'Performance Report'
          };

          let reports = JSON.parse(localStorage.getItem('assistantReports')) || [];
          reports.push(reportData);
          localStorage.setItem('assistantReports', JSON.stringify(reports));
          alert(`Report generated for ${assistant.name}`);
          window.location.href = 'ListofA.html'; // Redirect to the list after generating the report
        }
      };
    });
  </script>

</body>
</html>

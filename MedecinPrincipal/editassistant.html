<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Assistant</title>
  <style>
    /* Style de base pour la page */
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    /* Formulaire */
    #editForm {
      background-color: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 500px;
    }

    label {
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 8px;
      display: block;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 14px;
      box-sizing: border-box;
    }

    input[type="text"], input[type="email"] {
      font-size: 16px;
    }

    button {
      background-color: #4CAF50;
      color: white;
      padding: 12px 20px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
      width: 100%;
    }

    button:hover {
      background-color: #45a049;
    }

    button[type="button"] {
      background-color: #f44336;
      margin-top: 10px;
    }

    button[type="button"]:hover {
      background-color: #e53935;
    }

    /* Le bouton de retour (cancel) est un bouton rouge */
    .form-actions {
      display: flex;
      justify-content: space-between;
      margin-top: 20px;
    }

    .form-actions button {
      width: 48%;
    }
  </style>
</head>
<body>

  <h1>Edit Assistant</h1>

  <form id="editForm">
    <label for="name">Name:</label>
    <input type="text" id="name" name="name" required>

    <label for="doctor">Supervising Doctor:</label>
    <input type="text" id="doctor" name="doctor" required>

    <label for="phone">Phone:</label>
    <input type="text" id="phone" name="phone" required>

    <label for="email">Email:</label>
    <input type="email" id="email" name="email" required>

    <label for="status">Status:</label>
    <select id="status" name="status" required>
      <option value="Active">Active</option>
      <option value="Inactive">Inactive</option>
    </select>

    <div class="form-actions">
      <button type="submit">Save Changes</button>
      <button type="button" onclick="window.location.href='ListofA.html'">Cancel</button>
    </div>
  </form>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const urlParams = new URLSearchParams(window.location.search);
      const id = parseInt(urlParams.get('id')); // Get the ID from the URL
      let assistants = JSON.parse(localStorage.getItem("assistants")) || [];
      const assistant = assistants.find(a => a.id === id);

      if (assistant) {
        document.getElementById("name").value = assistant.name;
        document.getElementById("doctor").value = assistant.doctor;
        document.getElementById("phone").value = assistant.phone;
        document.getElementById("email").value = assistant.email;
        document.getElementById("status").value = assistant.status;
      } else {
        alert("Assistant not found.");
      }

      document.getElementById("editForm").addEventListener("submit", function(event) {
        event.preventDefault(); // Prevent form submission

        const newName = document.getElementById("name").value;
        const newDoctor = document.getElementById("doctor").value;
        const newPhone = document.getElementById("phone").value;
        const newEmail = document.getElementById("email").value;
        const newStatus = document.getElementById("status").value;

        assistant.name = newName;
        assistant.doctor = newDoctor;
        assistant.phone = newPhone;
        assistant.email = newEmail;
        assistant.status = newStatus;

        // Save changes to localStorage
        localStorage.setItem("assistants", JSON.stringify(assistants));
        alert("Assistant updated successfully!");
        window.location.href = 'ListofA.html'; // Redirect back to the list
      });
    });
  </script>

</body>
</html>
